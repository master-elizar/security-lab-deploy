---
- name: Create Loki directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "1000"
    group: "1000"
    mode: '0755'
  loop:
    - "{{ loki_dir }}"
    - "{{ loki_dir }}/data"

- name: Deploy Loki configuration (compatible with 3.x)
  ansible.builtin.copy:
    dest: "{{ loki_dir }}/loki-config.yaml"
    content: |
      auth_enabled: false

      server:
        http_listen_port: 3100

      ingester:
        wal:
          enabled: true
          dir: /loki/wal
        lifecycler:
          ring:
            kvstore:
              store: inmemory
            replication_factor: 1
        chunk_idle_period: 5m
        chunk_retain_period: 30s

      schema_config:
        configs:
          - from: 2020-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage_config:
        tsdb_shipper:
          active_index_directory: /loki/tsdb-index
          cache_location: /loki/tsdb-cache
        filesystem:
          directory: /loki/chunks

      compactor:
        working_directory: /loki/compactor
        retention_enabled: false

      limits_config:
        ingestion_rate_mb: 10
        ingestion_burst_size_mb: 20
    owner: "1000"
    group: "1000"
    mode: '0644'

- name: Deploy Loki container
  community.docker.docker_container:
    name: loki
    image: "grafana/loki:{{ loki_version }}"
    restart_policy: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - "{{ loki_dir }}/loki-config.yaml:/etc/loki/loki-config.yaml:ro"
      - "{{ loki_dir }}/data:/loki"
    user: "1000:1000"
    command: ["-config.file=/etc/loki/loki-config.yaml"]