---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: yes

- name: Allow SSH
  community.general.ufw:
    rule: allow
    name: OpenSSH

- name: Set default incoming policy
  community.general.ufw:
    direction: incoming
    policy: deny

- name: Set default outgoing policy
  community.general.ufw:
    direction: outgoing
    policy: allow

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Allow Loki port (3100) from security nodes
  community.general.ufw:
    rule: allow
    port: '3100'
    proto: tcp
  when: inventory_hostname in groups['monitoring_hosts']
